# cf. https://docs.n8n.io/hosting/configuration/task-runners/#setting-up-external-mode

volumes:
  n8n:
  n8n-data:

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
     - 5678:5678
#    - 5679:5679
    user: root
    working_dir: /opt/n8n
#   command: n8n start
    environment:
     - TZ=${TZ}
     # n8n base folder  /home/node(/.n8n) => /opt/n8n/(.n8n) 
     - N8N_USER_FOLDER=/opt/n8n
     # DONOT SET THIS VAR TO allow n8n custom install on UI. below causes failure on install from UI
     #- N8N_CUSTOM_EXTENSIONS=/opt/n8n/.n8n/nodes
     # R/W access from n8n node, acceptable folder
     - N8N_RESTRICT_FILE_ACCESS_TO=/data
     # allow to use modules
     - N8N_COMMUNITY_PACKAGES_ENABLED=true
     - NODE_FUNCTION_ALLOW_BUILTIN=*
     - NODE_FUNCTION_ALLOW_EXTERNAL=*
     - N8N_RUNNERS_STDLIB_ALLOW=*
     - N8N_RUNNERS_EXTERNAL_ALLOW=*
     #
     - N8N_HOST=0.0.0.0
     - N8N_SECURE_COOKIE=false
     # runner
     - N8N_RUNNERS_ENABLED=true
     - N8N_RUNNERS_MODE=external
     - N8N_NATIVE_PYTHON_RUNNER=true
     - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
     - N8N_RUNNERS_AUTH_TOKEN=your-secret-here
    volumes:
     -  n8n:/opt/n8n
     -  n8n-data:/data
     # mount host folder
     -  ${wDir}:${wDir}

  n8n-runner:
    image: n8nio/runners:latest
    container_name: n8n-runner
    environment:
     - N8N_RUNNERS_AUTH_TOKEN=your-secret-here
     - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
     # allow to use modules
     - N8N_RUNNERS_STDLIB_ALLOW=*
     - N8N_RUNNERS_EXTERNAL_ALLOW=*
    depends_on:
     - n8n
